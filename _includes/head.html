<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% if page.title and page.layout != 'home' %}{{ page.title }} — {% endif %}{{ site.title }}</title>
<meta name="description" content="{{ page.description | default: site.description }}">

{% seo %}
{% feed_meta %}

<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

<!-- Font Awesome -->
<link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  crossorigin="anonymous" referrerpolicy="no-referrer">

{% if site.avatar %}
  <link rel="icon" href="{{ site.avatar | relative_url }}">
{% endif %}

<!-- Google Analytics GA4 -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-KQ2L9X02HK"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-KQ2L9X02HK');
</script>

<!-- Prevent dark-mode flash -->
<script>
  (function(){
    var m = localStorage.getItem('hd-mode') ||
            (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    document.documentElement.setAttribute('data-mode', m);
  })();
</script>
