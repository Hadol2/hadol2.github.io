title:       Hadol_s
tagline:     Hadol_log
description: Hadol's programming blog — Dev, Projects, PS

url:     "https://hadol2.github.io"
baseurl: ""

lang:     ko-KR
timezone: Asia/Seoul

github:
  username: jhs9918

social:
  name:  Hadol
  email: jhs9918@naver.com
  links:
    - https://github.com/jhs9918

avatar: "/assets/img/favicons/profile/avatar.jpg"

# ── Plugins ──────────────────────────────────────────────────────────────────

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-archives
  - jekyll-paginate

paginate:      10
paginate_path: /page:num/

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag:      tag
  permalinks:
    tag:      /tags/:name/
    category: /categories/:name/

# ── Collections ───────────────────────────────────────────────────────────────

collections:
  tabs:
    output:   true
    sort_by:  order

# ── Defaults ─────────────────────────────────────────────────────────────────

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout:    post
      toc:       true
      permalink: /posts/:title/
  - scope:
      path: ""
      type: tabs
    values:
      layout:    page
      permalink: /:title/

# ── Markdown ─────────────────────────────────────────────────────────────────

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line:   1

# ── SASS ─────────────────────────────────────────────────────────────────────

sass:
  sass_dir: _sass
  style:     compressed

# ── Exclusions ───────────────────────────────────────────────────────────────

include:
  - googlef6d6807315522fca.html

exclude:
  - "*.gem"
  - "*.gemspec"
  - Gemfile.lock
  - docs
  - tools
  - README.md
  - LICENSE
  - "*.config.js"
  - package*.json
  - node_modules
  - _javascript
  - _app
